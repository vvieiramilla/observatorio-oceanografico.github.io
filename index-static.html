<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Observatório Oceanográfico — O2</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Favicon -->
  <link rel="icon" href="/o2-site-v2/assets/img/favicon.ico">

  <style>
    /* Base */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
      color: #fff;
    }

    /* Faixa institucional */
.institutional-bar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 40px;
  background: rgba(255, 255, 255, 0.85);
  color: #111;
  z-index: 10;
  font-size: 0.85rem;
  backdrop-filter: blur(6px);
  border-bottom: 1px solid rgba(0, 0, 0, 0.1);
}

.institutional-inner {
  max-width: 1200px;
  height: 100%;
  margin: 0 auto;
  padding: 0 1rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.institutional-bar a {
  color: #0055a5;
  text-decoration: none;
  font-weight: 500;
}

.institutional-bar a:hover {
  text-decoration: underline;
}


    /* Vídeo de fundo */
    .bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* Conteúdo principal */
    .content {
      position: relative;
      z-index: 1;
      max-width: 900px;
      padding: calc(4rem + 40px) 4rem 4rem 4rem;
    }

    /* Preferência por redução de movimento */
    @media (prefers-reduced-motion: reduce) {
      .bg-video {
        display: none;
      }

      body {
        background: url('/o2-site-v2/assets/img/o2-bg.png') center / cover no-repeat;
        color: #ffffff;
      }

      .institutional-bar {
        display: block;
      }
    }

    /* Ajustes para mobile */
    @media (max-width: 600px) {
      .institutional-bar {
        height: 32px;
        font-size: 0.75rem;
      }

      .content {
        padding: calc(3rem + 32px) 2rem 2rem 2rem;
      }
    }
  </style>
</head>

<body>

  <!-- Faixa institucional -->
  <div class="institutional-bar">
    <div class="institutional-inner">
      <span>Universidade Federal Fluminense</span>
      <a href="https://www.uff.br" target="_blank" rel="noopener">UFF</a>
    </div>
  </div>

  <!-- Vídeo de background -->
  <video
    class="bg-video"
    autoplay
    muted
    loop
    playsinline
    poster="/o2-site-v2/assets/img/o2-bg.png">
    <source src="/o2-site-v2/assets/video/o2-bg.mp4" type="video/mp4">
  </video>

  <!-- Conteúdo -->
  <div class="content">
    <h1>Observatório Oceanográfico</h1>
    <p>Versão v2 — ambiente de testes</p>
  </div>

</body>
</html>
