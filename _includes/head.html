<head>
  <meta charset="utf-8">
  <title>{{ page.title }} — Observatório Oceanográfico</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Favicon -->
  <link rel="icon" href="{{ site.baseurl }}/assets/img/favicon.ico">

  <!-- CSS principal -->
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css">

  <!-- Font Awesome (ícones sociais) -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        referrerpolicy="no-referrer">

  <!-- Redirecionamento automático de idioma -->
  <script>
    (function () {
      // Só roda na raiz
      if (window.location.pathname !== '/' &&
          window.location.pathname !== '{{ site.baseurl }}/') {
        return;
      }

      // Evita redirecionar se o usuário já escolheu
      if (localStorage.getItem('o2-lang')) {
        return;
      }

      var lang = navigator.language || navigator.userLanguage;

      if (lang && lang.toLowerCase().startsWith('en')) {
        localStorage.setItem('o2-lang', 'en');
        window.location.href = '{{ site.baseurl }}/en/';
      } else {
        localStorage.setItem('o2-lang', 'pt');
      }
    })();
  </script>
  <!-- RSS Feed -->
  <link
    rel="alternate"
    type="application/rss+xml"
    title="Observatório Oceanográfico — Notícias"
    href="{{ site.baseurl }}/feed.xml">

  {% include analytics.html %}  
</head>
